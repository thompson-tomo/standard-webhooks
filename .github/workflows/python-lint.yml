name: Python Lint
on:
  pull_request:
    paths:
      - "libraries/python/**"
      - ".github/workflows/python-lint.yml"
defaults:
  run:
    working-directory: libraries/python
jobs:
  build:
    name: Python Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync
      - name: Run linting
        run: uv run scripts/lint.sh
      - name: Run tests
        run: uv run pytest
  python-test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
      - name: Install deps
        run: uv sync
      - name: Build wheels
        run: uv build
      - name: Test install wheels
        run: |
          mkdir /tmp/test-install
          cd /tmp/test-install
          uv run --python '3.14' python3 -m venv venv
          venv/bin/pip install "${{ github.workspace }}"/libraries/python/dist/standardwebhooks*.whl
          venv/bin/python -c 'import standardwebhooks ; print(standardwebhooks.__version__)'
